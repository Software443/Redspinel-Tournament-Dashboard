<!DOCTYPE html>
<html>

<head>
    <title>League Table</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="p-4">

    <h2>League Table</h2>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>#</th>
                <th>Team</th>
                <th>P</th>
                <th>W</th>
                <th>D</th>
                <th>L</th>
                <th>GF</th>
                <th>GA</th>
                <th>GD</th>
                <th>Pts</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script type="module">
        import { supabase } from "./supabase/config.js";

        async function loadTable() {
            const { data: teams } = await supabase
                .from("teams")
                .select("id, name, badge_url");
            const { data: results } = await supabase
                .from("results")
                .select("*, fixtures(*)");

            let table = {};

            teams.forEach(t => {
                table[t.id] = {
                    name: t.name,
                    played: 0,
                    win: 0,
                    draw: 0,
                    loss: 0,
                    gf: 0,
                    ga: 0,
                    pts: 0
                };
            });

            results.forEach(r => {
                const f = r.fixtures;

                const home = table[f.home_team_id];
                const away = table[f.away_team_id];

                if (!home || !away) return;

                home.played++;
                away.played++;

                home.gf += r.home_score;
                home.ga += r.away_score;

                away.gf += r.away_score;
                away.ga += r.home_score;

                if (r.home_score > r.away_score) {
                    home.win++; home.pts += 3;
                    away.loss++;
                } else if (r.home_score < r.away_score) {
                    away.win++; away.pts += 3;
                    home.loss++;
                } else {
                    home.draw++; away.draw++;
                    home.pts++; away.pts++;
                }
            });

            let sorted = Object.values(table).sort((a, b) =>
                b.pts - a.pts || (b.gf - b.ga) - (a.gf - a.ga)
            );

            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";

            sorted.forEach((t, i) => {
                tbody.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td style="display:flex;align-items:center;gap:10px;">
        <img src="${t.badge_url || ''}" width="30" height="30" style="border-radius:50%">
        ${t.name}
        </td>
        <td>${t.played}</td>
        <td>${t.win}</td>
        <td>${t.draw}</td>
        <td>${t.loss}</td>
        <td>${t.gf}</td>
        <td>${t.ga}</td>
        <td>${t.gf - t.ga}</td>
        <td>${t.pts}</td>
      </tr>
    `;
            });
        }

        loadTable();
    </script>

</body>

</html>
