<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ULTIMATE CUP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Animate.css -->

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #5e0101;
      color: white;
    }

    /* HERO */
    .hero {
      height: 100vh;
      background: radial-gradient(circle at center, #710101, #020617);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: bold;
    }

    .btn-main {
      background: white;
      color: #0d6efd;
      border-radius: 30px;
      padding: 10px 25px;
      font-weight: bold;
    }

    /* STATS */
    .stats {
      background: #020617;
      padding: 40px 0;
    }

    .stat-box {
      text-align: center;
    }

    .stat-number {
      font-size: 2.5rem;
      font-weight: bold;
      color: #0d6efd;
    }

    /* CARDS */
    .card {
      border-radius: 15px;
      background: white;
      color: black;
    }

    .logo {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      object-fit: cover;
    }

    .section {
      padding: 60px 20px;
    }
  </style>

</head>

<body>

<!-- HERO -->

<section class="hero">
  <div class="animate__animated animate__fadeInDown">
    <img src="images/Ultimate Cup White.png", height="300px", width="300px" alt="">
    <p>Experience football like never before</p>
    <div class="mt-4">
    <a href="fixtures.html" class="btn btn-main me-2">Fixtures</a>
    <a href="standing.html" class="btn btn-outline-light">Standings</a>
    </div>
  </div>
</section>

<!-- LIVE STATS -->

<section class="stats">
  <div class="container">
    <div class="row text-center">

  <div class="col-6 col-md-3 stat-box">
    <div class="stat-number" id="teamsCount">0</div>
    <small>Teams</small>
  </div>

  <div class="col-6 col-md-3 stat-box">
    <div class="stat-number" id="matchesCount">0</div>
    <small>Matches</small>
  </div>

  <div class="col-6 col-md-3 stat-box">
    <div class="stat-number" id="goalsCount">0</div>
    <small>Goals</small>
  </div>

  <div class="col-6 col-md-3 stat-box">
    <div class="stat-number" id="playersCount">0</div>
    <small>Players</small>
  </div>

</div>

  </div>
</section>

<!-- TOP SCORERS -->

<section class="section">
  <div class="container">
    <h2 class="text-center mb-4">🔥 Top Scorers</h2>
    <div id="scorers"></div>
  </div>
</section>

<!-- FIXTURES -->

<section class="section bg-light text-dark">
  <div class="container">
    <h2 class="text-center mb-4">Upcoming Matches</h2>
    <div id="fixtures"></div>
  </div>
</section>

<script type="module">
import { supabase } from "./supabase/config.js";

function animateCount(id, end) {
  let start = 0;
  const el = document.getElementById(id);
  const speed = 20;

  const counter = setInterval(() => {
    start += Math.ceil(end / 50);
    if (start >= end) {
      el.innerText = end;
      clearInterval(counter);
    } else {
      el.innerText = start;
    }
  }, speed);
}

// 🔢 LOAD STATS
async function loadStats() {
  const { data: teams } = await supabase.from("teams").select("*");
  const { data: matches } = await supabase.from("fixtures").select("*");
  const { data: results } = await supabase.from("results").select("*");
  const { data: players } = await supabase.from("players").select("*");

  let goals = 0;
  results.forEach(r => {
    goals += (r.home_score || 0) + (r.away_score || 0);
  });

  animateCount("teamsCount", teams.length);
  animateCount("matchesCount", matches.length);
  animateCount("goalsCount", goals);
  animateCount("playersCount", players.length);
}

// 🔥 TOP SCORERS
async function loadScorers() {
  const { data } = await supabase
    .from("players")
    .select("name, goals, teams(name, badge_url)")
    .order("goals", { ascending: false })
    .limit(5);

  const container = document.getElementById("scorers");

  data.forEach((p, i) => {
    container.innerHTML += `
      <div class="card p-3 mb-2 animate__animated animate__fadeInUp">
        <div class="d-flex justify-content-between">
          <div class="d-flex align-items-center gap-2">
            <img src="${p.teams?.badge_url || ''}" class="logo">
            ${p.name}
        </div>
          <strong>${p.goals} ⚽</strong>
        </div>
      </div>
    `;
  });
}

// ⚽ FIXTURES
async function loadFixtures() {
  const { data } = await supabase
    .from("fixtures")
    .select("*, home:teams!home_team_id(name, badge_url), away:teams!away_team_id(name, badge_url)")
    .limit(5);

  const container = document.getElementById("fixtures");

  data.forEach(f => {
    container.innerHTML += `
      <div class="card p-3 mb-3 animate__animated animate__fadeInUp">
        <div class="d-flex justify-content-between align-items-center">

          <div class="d-flex align-items-center gap-2">
            <img src="${f.home.badge_url || ''}" class="logo">
            ${f.home.name}
          </div>

          <strong>VS</strong>

          <div class="d-flex align-items-center gap-2">
            ${f.away.name}
            <img src="${f.away.badge_url || ''}" class="logo">
          </div>

        </div>
      </div>
    `;
  });
}

loadStats();
loadScorers();
loadFixtures();
</script>

</body>
</html>
