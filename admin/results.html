<!DOCTYPE html>
<html>

<head>
    <title>Results</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="d-flex">
        <div class="bg-dark text-white p-3 vh-100" style="width:250px;">
            <h4>Admin</h4>
            <a href="dashboard.html" class="nav-link text-white">Dashboard</a>
            <a href="fixtures.html" class="nav-link text-white">Fixtures</a>
            <a href="results.html" class="nav-link text-white active">Results</a>
        </div>

        <div class="p-4 flex-grow-1">
            <h2>Enter Results</h2>

            <div class="row mb-3">
                <div class="col-md-4">
                    <select id="fixtureSelect" class="form-control"></select>
                </div>
                <div class="col-md-2">
                    <input id="homeScore" type="number" class="form-control" placeholder="Home">
                </div>
                <div class="col-md-2">
                    <input id="awayScore" type="number" class="form-control" placeholder="Away">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-success" onclick="addResult()">Save</button>
                </div>
            </div>
            <div class="mt-3">
                <h5>Goal Scorers</h5>
                <select id="scorerPlayer" class="form-control"></select>
                <input type="number" id="goals" placeholder="Goals" class="form-control mt-2">
                <button class="btn btn-secondary mt-2" onclick="addScorer()">Add Scorer</button>
            </div>

            <table class="table">
                <thead>
                    <tr>
                        <th>Match</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody id="resultsTable"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { supabase } from "../supabase/config.js";

        async function loadFixtures() {
            const { data } = await supabase
                .from("fixtures")
                .select(`
                *,
                fixtures(
                    *,
                    home:teams!home_team_id(name, badge_url),
                    away:teams!away_team_id(name, badge_url)
                )
                `)

            const select = document.getElementById("fixtureSelect");
            select.innerHTML = "";

            data.forEach(f => {
                select.innerHTML += `<option value="${f.id}"><img src="${f.home.badge_url}" alt="${f.home.name}" width="30" height="30"> ${f.home.name} vs ${f.away.name} <img src="${f.away.badge_url}" alt="${f.away.name}" width="30" height="30"></option>`;
            });
        }

        async function addResult() {
            const fixture_id = document.getElementById("fixtureSelect").value;
            const home_score = document.getElementById("homeScore").value;
            const away_score = document.getElementById("awayScore").value;

            // 🔍 Check if result already exists
            const { data: existing } = await supabase
                .from("results")
                .select("*")
                .eq("fixture_id", fixture_id)
                .single();

            if (existing) {
                // 🔄 UPDATE
                const { error } = await supabase
                    .from("results")
                    .update({ home_score, away_score })
                    .eq("fixture_id", fixture_id);

                if (error) return alert(error.message);
                alert("Result updated!");
            } else {
                // ➕ INSERT
                const { error } = await supabase
                    .from("results")
                    .insert([{ fixture_id, home_score, away_score }]);

                if (error) return alert(error.message);
                alert("Result saved!");
            }

            loadResults();
        }

        async function loadResults() {
            const { data } = await supabase
                .from("results")
                .select("*, fixtures(*, home:teams!home_team_id(name, badge_url), away:teams!away_team_id(name, badge_url)))");

            const table = document.getElementById("resultsTable");
            table.innerHTML = "";

            data.forEach(r => {
                table.innerHTML += `
                    <tr>
                    <td style="display:flex;align-items:center;justify-content:center;gap:10px;">

                        <div style="display:flex;align-items:center;gap:8px;">
                        <img src="${r.fixtures.home.badge_url || ''}" width="30" height="30" style="border-radius:50%">
                        ${r.fixtures.home.name}
                        </div>

                        <strong>${r.home_score} - ${r.away_score}</strong>

                        <div style="display:flex;align-items:center;gap:8px;">
                        <img src="${r.fixtures.away.badge_url || ''}" width="30" height="30" style="border-radius:50%">
                        ${r.fixtures.away.name}
                        </div>

                    </td>
                    </tr>
                    `;
            });
        }

        window.addResult = addResult;

        loadFixtures();
        loadResults();

        function setLoading(id, state) {
            const el = document.getElementById(id);
            if (state) {
                el.innerHTML = `<tr><td colspan="5">Loading...</td></tr>`;
            }
        }
    </script>

</body>

</html>
