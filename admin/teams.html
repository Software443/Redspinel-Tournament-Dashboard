<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Teams</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

    <div class="d-flex">
        <!-- Sidebar -->
        <div class="bg-dark text-white p-3 vh-100" style="width: 250px;">
            <h4 class="mb-4">Tournament Admin</h4>
            <ul class="nav flex-column">
                <li class="nav-item mb-2"><a href="dashboard.html" class="nav-link text-white">Dashboard</a></li>
                <li class="nav-item mb-2"><a href="teams.html" class="nav-link text-white active">Teams</a></li>
                <li class="nav-item mb-2"><a href="players.html" class="nav-link text-white">Players</a></li>
                <li class="nav-item mb-2"><a href="fixtures.html" class="nav-link text-white">Fixtures</a></li>
                <li class="nav-item mb-2"><a href="results.html" class="nav-link text-white">Results</a></li>
                <li class="nav-item mb-2"><a href="announcements.html" class="nav-link text-white">Announcements</a>
                </li>
                <li class="nav-item mb-2"><a href="../login.html" class="nav-link text-danger"
                        onclick="logout()">Logout</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="p-4 flex-grow-1">
            <h2>Teams Management</h2>

            <div class="card shadow p-4 mb-4">
                <h5>Add New Team</h5>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <input type="text" id="teamName" class="form-control" placeholder="Team Name">
                    </div>
                    <div class="col-md-3 mb-3">
                        <input type="text" id="coach" class="form-control" placeholder="Coach Name">
                    </div>
                    <div class="col-md-2 mb-3">
                        <input type="text" id="groupName" class="form-control" placeholder="Group">
                    </div>
                    <div class="col-md-2 mb-3">
                        <input type="number" id="yearEstablished" class="form-control" placeholder="Year">
                    </div>
                    <div class="col-md-3 mb-3">
                        <input type="file" id="badge" class="form-control">
                    </div>
                    <div class="col-md-1 mb-3">
                        <button class="btn btn-primary w-100" onclick="addTeam()">Add</button>
                    </div>
                </div>
            </div>

            <div class="card shadow p-4">
                <h5>All Teams</h5>
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Coach</th>
                                <th>Group</th>
                                <th>Year</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="teamsTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from "../supabase/config.js";

        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = "../login.html";
            }
        }

        async function addTeam() {
            const name = document.getElementById("teamName").value;
            const coach = document.getElementById("coach").value;
            const group_name = document.getElementById("groupName").value;
            const year_established = document.getElementById("yearEstablished").value;

            const file = document.getElementById("badge")?.files[0]; // 👈 new

            if (!name) return alert("Team name is required");

            let badge_url = null; // 👈 default

            // 🔼 STEP 1: Upload image if exists
            if (file) {
                const fileName = Date.now() + "_" + file.name;

                const { error: uploadError } = await supabase.storage
                    .from("team-logos")
                    .upload(fileName, file);

                if (uploadError) {
                    alert("Image upload failed: " + uploadError.message);
                    return;
                }

                // 🔗 STEP 2: Get public URL
                const { data } = supabase.storage
                    .from("team-logos")
                    .getPublicUrl(fileName);

                badge_url = data.publicUrl;
            }

            // 🗃️ STEP 3: Insert into DB
            const { error } = await supabase.from("teams").insert([
                {
                    name,
                    coach,
                    group_name,
                    year_established,
                    badge_url // 👈 new field
                }
            ]);

            if (error) {
                alert(error.message);
            } else {
                alert("Team added successfully");

                // 🧹 Clear inputs
                document.getElementById("teamName").value = "";
                document.getElementById("coach").value = "";
                document.getElementById("groupName").value = "";
                document.getElementById("yearEstablished").value = "";
                if (document.getElementById("badge")) {
                    document.getElementById("badge").value = "";
                }

                loadTeams();
            }
        }

        async function loadTeams() {
            const { data, error } = await supabase
                .from("teams")
                .select("*")
                .order("id", { ascending: false });

            const table = document.getElementById("teamsTable");
            table.innerHTML = "";

            if (data) {
                data.forEach(team => {
                    table.innerHTML += `
            <tr>
                <td>
                <img src="${team.badge_url || ''}" 
                    width="40" height="40" 
                    style="border-radius:50%;object-fit:cover;margin-right:8px;">
                ${team.name}
                </td>
              <td>${team.name}</td>
              <td>${team.coach ?? ""}</td>
              <td>${team.group_name ?? ""}</td>
              <td>${team.year_established ?? ""}</td>
              <td>
                <button class="btn btn-warning btn-sm" onclick="editTeam(${team.id}, '${team.name}')">Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteTeam(${team.id})">Delete</button>
              </td>
            </tr>
          `;
                });
            }
        }

        async function editTeam(id, currentName) {
            const newName = prompt("Edit team name:", currentName);
            if (!newName) return;

            const { error } = await supabase
                .from("teams")
                .update({ name: newName })
                .eq("id", id);

            if (error) alert(error.message);
            else loadTeams();
        }

        async function deleteTeam(id) {
            if (!confirm("Delete this team?")) return;

            const { error } = await supabase.from("teams").delete().eq("id", id);

            if (error) {
                alert(error.message);
            } else {
                loadTeams();
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = "../login.html";
        }

        window.addTeam = addTeam;
        window.deleteTeam = deleteTeam;
        window.logout = logout;

        checkAuth();
        loadTeams();

        function setLoading(id, state) {
            const el = document.getElementById(id);
            if (state) {
                el.innerHTML = `<tr><td colspan="5">Loading...</td></tr>`;
            }
        }
    </script>

</body>

</html>
