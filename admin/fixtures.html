<!DOCTYPE html>
<html>

<head>
    <title>Fixtures</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="d-flex">
        <div class="bg-dark text-white p-3 vh-100" style="width:250px;">
            <h4>Admin</h4>
            <a href="dashboard.html" class="nav-link text-white">Dashboard</a>
            <a href="teams.html" class="nav-link text-white">Teams</a>
            <a href="players.html" class="nav-link text-white">Players</a>
            <a href="fixtures.html" class="nav-link text-white active">Fixtures</a>
        </div>

        <div class="p-4 flex-grow-1">
            <h2>Create Fixture</h2>

            <div class="row mb-3">
                <div class="col-md-3"><select id="teamA" class="form-control"></select></div>
                <div class="col-md-3"><select id="teamB" class="form-control"></select></div>
                <div class="col-md-2"><input type="date" id="date" class="form-control"></div>
                <div class="col-md-2"><input type="text" id="venue" class="form-control" placeholder="Venue"></div>
                <div class="col-md-2"><button class="btn btn-primary" onclick="addFixture()">Add</button></div>
            </div>

            <table class="table">
                <thead>
                    <tr>
                        <th>Match</th>
                        <th>Date</th>
                        <th>Venue</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="fixtureTable"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { supabase } from "../supabase/config.js";

        async function loadTeams() {
            const { data } = await supabase.from("teams").select("*");

            const teamA = document.getElementById("teamA");
            const teamB = document.getElementById("teamB");

            teamA.innerHTML = "";
            teamB.innerHTML = "";

            data.forEach(t => {
                teamA.innerHTML += `<option value="${t.id}">${t.name}</option>`;
                teamB.innerHTML += `<option value="${t.id}">${t.name}</option>`;
            });
        }

        async function addFixture() {
            const home_team_id = teamA.value;
            const away_team_id = teamB.value;
            const match_date = date.value;
            const venue = document.getElementById("venue").value;

            if (home_team_id === away_team_id) return alert("Teams must be different");

            await supabase.from("fixtures").insert([
                { home_team_id, away_team_id, match_date, venue }
            ]);

            loadFixtures();
        }

        async function loadFixtures() {
            const { data } = await supabase
                .from("fixtures")
                .select("*, home:teams!home_team_id(name, badge_url), away:teams!away_team_id(name, badge_url)");

            const table = document.getElementById("fixtureTable");
            table.innerHTML = "";

            data.forEach(f => {
                    table.innerHTML += `
        <tr>
            <td><img src="${f.home.badge_url}" alt="${f.home.name}" width="30" height="30"> ${f.home.name} vs ${f.away.name} <img src="${f.away.badge_url}" alt="${f.away.name}" width="30" height="30"></td>
            <td>${f.match_date}</td>
            <td>${f.venue}</td>
            <td><button onclick="deleteFixture(${f.id})" class="btn btn-danger btn-sm">Delete</button></td>
        </tr>
        `;
                });
            }

            async function deleteFixture(id) {
                await supabase.from("fixtures").delete().eq("id", id);
                loadFixtures();
            }

            window.addFixture = addFixture;
            window.deleteFixture = deleteFixture;

            loadTeams();
            loadFixtures();

            function setLoading(id, state) {
                const el = document.getElementById(id);
                if (state) {
                    el.innerHTML = `<tr><td colspan="5">Loading...</td></tr>`;
            }
        }
    </script>

</body>

</html>
