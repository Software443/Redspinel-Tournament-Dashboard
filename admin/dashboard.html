<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

    <div class="d-flex">
        <!-- MOBILE TOP BAR -->
    <nav class="navbar navbar-dark bg-dark d-md-none">
    <div class="container-fluid">
            <span class="navbar-brand">🏆 NASMA CUP</span>
            <button class="btn btn-outline-light" onclick="toggleMenu()">☰</button>
        </div>
        </nav>

        <!-- SIDEBAR -->
       <div class="bg-dark text-white p-3 vh-100" style="width: 250px;">
            <h4 class="mb-4">Tournament Admin</h4>
            <ul class="nav flex-column">
                <li class="nav-item mb-2"><a href="dashboard.html" class="nav-link text-white">Dashboard</a></li>
                <li class="nav-item mb-2"><a href="teams.html" class="nav-link text-white">Teams</a></li>
                <li class="nav-item mb-2"><a href="players.html" class="nav-link text-white">Players</a></li>
                <li class="nav-item mb-2"><a href="fixtures.html" class="nav-link text-white">Fixtures</a></li>
                <li class="nav-item mb-2"><a href="results.html" class="nav-link text-white">Results</a></li>
                <li class="nav-item mb-2"><a href="announcements.html" class="nav-link text-white">Announcements</a>
                </li>
                <li class="nav-item mb-2"><a href="../login.html" class="nav-link text-danger"
                        onclick="logout()">Logout</a></li>
            </ul>
        </div>
        <!-- Main Content -->
        <div class="p-4 flex-grow-1">
            <h2>Welcome to the Admin Dashboard</h2>
            <p>Manage tournament teams, players, fixtures, results and announcements.</p>

            <div class="row mt-4">
                <div class="col-md-3">
                    <div class="card shadow p-3">
                        <h5>Teams</h5>
                        <p id="teamCount">0</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow p-3">
                        <h5>Players</h5>
                        <p id="playerCount">0</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow p-3">
                        <h5>Fixtures</h5>
                        <p id="fixtureCount">0</p>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow p-3">
                        <h5>Results</h5>
                        <p id="resultCount">0</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from "../supabase/config.js";

        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = "../login.html";
            }
        }

        async function loadCounts() {
            const { count: teams } = await supabase.from("teams").select("*", { count: "exact", head: true });
            const { count: players } = await supabase.from("players").select("*", { count: "exact", head: true });
            const { count: fixtures } = await supabase.from("fixtures").select("*", { count: "exact", head: true });
            const { count: results } = await supabase.from("results").select("*", { count: "exact", head: true });

            document.getElementById("teamCount").innerText = teams ?? 0;
            document.getElementById("playerCount").innerText = players ?? 0;
            document.getElementById("fixtureCount").innerText = fixtures ?? 0;
            document.getElementById("resultCount").innerText = results ?? 0;
        }

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = "../login.html";
        }

        window.logout = logout;

        checkAuth();
        loadCounts();

        function setLoading(id, state) {
            const el = document.getElementById(id);
            if (state) {
                el.innerHTML = `<tr><td colspan="5">Loading...</td></tr>`;
            }
        }

        window.toggleMenu = toggleMenu;
    </script>

</body>

</html>
