<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Players Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body>

    <div class="d-flex">
        <!-- Sidebar -->
        <div class="bg-dark text-white p-3 vh-100" style="width:250px;">
            <h4>Admin</h4>
            <a href="dashboard.html" class="nav-link text-white">Dashboard</a>
            <a href="teams.html" class="nav-link text-white">Teams</a>
            <a href="players.html" class="nav-link text-white active">Players</a>
            <a href="fixtures.html" class="nav-link text-white">Fixtures</a>
            <a href="results.html" class="nav-link text-white">Results</a>
        </div>

        <!-- Content -->
        <div class="p-4 flex-grow-1">
            <h2>Players</h2>

            <!-- Add Player -->
            <div class="card p-3 mb-4">
                <h5>Add Player</h5>
                <div class="row">
                    <div class="col-12 col-md-3">
                        <input id="playerName" class="form-control" placeholder="Player Name">
                    </div>
                    <div class="col-12 col-md-3">
                        <select id="teamSelect" class="form-control"></select>
                    </div>
                    <div class="col-12 col-md-2">
                        <input id="jersey" type="number" class="form-control" placeholder="Jersey">
                    </div>
                    <div class="col-12 col-md-2">
                        <input id="position" class="form-control" placeholder="Position">
                    </div>
                    <div class="col-12 col-md-2">
                        <button class="btn btn-primary w-100" onclick="addPlayer()">Add</button>
                    </div>
                </div>
            </div>

            <!-- Players Table -->
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Team</th>
                        <th>Jersey</th>
                        <th>Position</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="playersTable"></tbody>
            </table>

        </div>
    </div>

    <script type="module">
        import { supabase } from "../supabase/config.js";

        async function loadTeams() {
            const { data } = await supabase.from("teams").select("*");
            const select = document.getElementById("teamSelect");
            select.innerHTML = "";
            data.forEach(t => {
                select.innerHTML += `<option value="${t.id}">${t.name}</option>`;
            });
        }

        async function addPlayer() {
            const name = document.getElementById("playerName").value;
            const team_id = document.getElementById("teamSelect").value;
            const jersey_number = document.getElementById("jersey").value;
            const position = document.getElementById("position").value;

            if (!name) return alert("Player name required");

            const { error } = await supabase.from("players").insert([
                { name, team_id, jersey_number, position }
            ]);

            if (error) alert(error.message);
            else {
                alert("Player added");
                loadPlayers();
            }
        }

        async function loadPlayers() {
            const { data } = await supabase
                .from("players")
                .select("*, teams(name)");

            const table = document.getElementById("playersTable");
            table.innerHTML = "";

            data.forEach(p => {
                table.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.teams?.name ?? ""}</td>
        <td>${p.jersey_number ?? ""}</td>
        <td>${p.position ?? ""}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="deletePlayer(${p.id})">Delete</button>
        </td>
      </tr>
    `;
            });
        }

        async function deletePlayer(id) {
            if (!confirm("Delete player?")) return;

            await supabase.from("players").delete().eq("id", id);
            loadPlayers();
        }

        window.addPlayer = addPlayer;
        window.deletePlayer = deletePlayer;

        loadTeams();
        loadPlayers();

        function setLoading(id, state) {
            const el = document.getElementById(id);
            if (state) {
                el.innerHTML = `<tr><td colspan="5">Loading...</td></tr>`;
            }
        }
    </script>

</body>

</html>
